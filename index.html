<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalbim ❤️</title>
<style>
body{
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
font-family:Arial;
}
#sayi{
color:white;
font-size:120px;
}
#kalp{
display:none;
font-size:180px;
animation:kalp 1s infinite;
}
@keyframes kalp{
50%{transform:scale(1.3);}
}
</style>
</head>

<body>

<div id="sayi">3</div>
<div id="kalp">❤️</div>

<script>
let x=3;
let sayi=document.getElementById("sayi");
let kalp=document.getElementById("kalp");

let zaman=setInterval(()=>{
x--;
if(x>0){
sayi.innerHTML=x;
}else{
clearInterval(zaman);
sayi.style.display="none";
kalp.style.display="block";
}
},1000);
</script>

</body>
</html>
