<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
font-family:monospace;
overflow:hidden;
}

#sayac{
color:white;
font-size:120px;
}

#kalp{
display:none;
color:#00ff00;
font-size:18px;
line-height:18px;
text-align:center;
text-shadow:0 0 15px #00ff00;
}

.satir{
opacity:0;
animation:gel 0.35s forwards;
}

@keyframes gel{
from{
opacity:0;
transform:translateY(-20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

#yazi{
color:white;
font-size:22px;
margin-top:15px;
}
</style>
</head>

<body>

<div id="sayac">3</div>

<div id="kalp"></div>

<script>

let sayac=document.getElementById("sayac");
let kalp=document.getElementById("kalp");

let sayi=3;

let geri=setInterval(()=>{

sayi--;

if(sayi>0){
sayac.innerHTML=sayi;
}else{

clearInterval(geri);

sayac.style.display="none";
kalp.style.display="block";

kalpOlustur();

}

},1000);


function kalpOlustur(){

let sekil=[
"   **     **   ",
" ****** ****** ",
"***************",
"***************",
" ************* ",
"  ***********  ",
"   *********   ",
"    *******    ",
"     *****     ",
"      ***      ",
"       *       "
];


let kodlar="01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%";

let satirlar=[];


sekil.forEach((satir,index)=>{

let sonuc="";

for(let i=0;i<satir.length;i++){

if(satir[i]==" "){
sonuc+=" ";
}
else{
sonuc+=kodlar[Math.floor(Math.random()*kodlar.length)];
}

}

satirlar.push(
"<div class='satir' style='animation-delay:"+((index*4)/sekil.length)+"s'>"
+sonuc+
"</div>"
);

});


kalp.innerHTML=satirlar.join("")
+
"<div id='yazi'>Sen benimsin</div>";

}

</script>

</body>
</html>
